# ============================================
# myFireflyBlog — GitHub Actions 自动部署到服务器
# ============================================
# 触发方式:
#   1. Push 到 master 分支时自动触发
#   2. 也可在 GitHub Actions 页面手动触发 (workflow_dispatch)
#
# 前置条件 — 在 GitHub 仓库设置中添加以下 Secrets:
#   - SERVER_HOST: 服务器 IP (YOUR_SERVER_IP)
#   - SERVER_USERNAME: SSH 用户名 (YOUR_USER)
#   - SERVER_SSH_KEY: SSH 私钥内容（全量，含 -----BEGIN...-----）
# ============================================

name: Deploy to Server

on:
  push:
    branches: [ master ]
  workflow_dispatch:       # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🔧 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build site
        run: pnpm build

      - name: 📤 Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/"
          target: "/root/cc/myFireflyBlog"
          strip_components: 1    # 去掉 dist/ 前缀，直接放内容
          rm: true               # 删除服务器上旧文件

      - name: 🔄 Reload nginx container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo "🚀 停止旧容器..."
            docker stop myFireflyBlog 2>/dev/null || true
            docker rm myFireflyBlog 2>/dev/null || true

            echo "🚀 启动新容器..."
            docker run -d \
              --name myFireflyBlog \
              -v /root/cc/myFireflyBlog:/usr/share/nginx/html:ro \
              -p 80:80 \
              --restart always \
              nginx:alpine

            echo "✅ 部署完成"
